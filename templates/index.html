<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 对话浏览器</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>

    <!-- ═══════════════════════════════════════════ -->
    <!-- 初始状态：文件选择区 -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-inner">
            <span class="drop-icon">📂</span>
            <h2>Claude 对话浏览器</h2>
            <p class="drop-hint">拖拽 <code>conversations.json</code> 到此处</p>
            <p class="drop-or">— 或 —</p>
            <div class="file-actions">
                <button class="btn-primary" onclick="document.getElementById('file-input').click()">
                    📁 选择文件
                </button>
            </div>
            <input type="file" id="file-input" accept=".json" hidden onchange="handleFileSelect(event)">
        </div>
        <!-- 加载中状态 -->
        <div id="loading-overlay" class="loading-overlay" style="display:none">
            <div class="spinner"></div>
            <p id="loading-text">正在解析 JSON...</p>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- 加载后：对话浏览器 -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="app" style="display:none">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <button id="btn-new-file" class="btn-icon" title="加载新文件">📂</button>
                <input type="text" id="search-box" placeholder="🔍 搜索对话..." autocomplete="off">
                <button id="btn-profile" class="btn-icon" title="用户画像" style="display:none">👤</button>
                <button id="btn-theme" class="btn-icon" title="切换主题">🌙</button>
            </div>
            <div id="sidebar-stats" class="sidebar-stats"></div>
            <nav id="conversation-list"></nav>
        </aside>

        <!-- 主内容区 -->
        <main id="main-content">
            <div id="welcome-message" class="welcome-message">
                <div class="welcome-icon">👈</div>
                <h2>从左侧选择一个对话</h2>
                <p>共 <span id="total-count">0</span> 个对话</p>
            </div>

            <div id="conversation-view" style="display:none">
                <header id="conv-header">
                    <div class="conv-header-top">
                        <button id="btn-back" class="btn-icon" title="返回列表">←</button>
                        <div style="flex:1;min-width:0">
                            <h1 id="conv-title"></h1>
                            <div id="conv-meta"></div>
                        </div>
                        <button id="btn-outline" class="btn-icon" title="消息导航">☰</button>
                        <button id="btn-export" class="btn-icon" title="导出为 Markdown">📄</button>
                    </div>
                    <div id="conv-summary" class="conv-summary" data-expanded="false">
                        <button id="btn-summary-toggle" class="btn-summary-toggle" style="display:none">
                            📋 对话摘要 <span class="summary-chevron">▸</span>
                        </button>
                        <div id="conv-summary-body" class="conv-summary-body"></div>
                    </div>
                </header>
                <div id="message-list"></div>

                <!-- 消息导航面板 -->
                <div id="outline-panel" class="outline-panel" style="display:none">
                    <div class="outline-header">
                        <span>消息导航</span>
                        <button class="btn-icon outline-close" onclick="closeOutline()">✕</button>
                    </div>
                    <nav id="outline-list" class="outline-list"></nav>
                </div>
            </div>
        </main>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- 用户画像模态窗 -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="profile-modal" class="modal-overlay" style="display:none">
        <div class="modal-container">
            <div class="modal-header">
                <h2>👤 用户画像</h2>
                <span class="modal-hint">Claude 根据对话历史总结</span>
                <button class="btn-icon modal-close" onclick="closeProfile()">✕</button>
            </div>
            <div class="modal-body">
                <div id="profile-content" class="profile-content">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input-2" accept=".json" hidden onchange="handleFileSelect(event)">

    <!-- CDN 依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
